name: meokrok
description: 하루 먹은 음식을 기록하고 나만의 식습관 루틴을 만드는 앱
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # 상태관리
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # 로컬 DB
  drift: ^2.22.0
  sqlite3_flutter_libs: ^0.5.24
  path_provider: ^2.1.3
  path: ^1.9.0

  # 로컬 저장소
  shared_preferences: ^2.3.2

  # 차트
  fl_chart: ^0.69.0

  # 캘린더
  table_calendar: ^3.1.2

  # 폰트
  google_fonts: ^6.2.1

  # 날짜/시간
  intl: ^0.19.0

  # 라우팅
  go_router: ^14.2.7

  # 보안 (비밀번호 해시)
  crypto: ^3.0.3

  # UUID
  uuid: ^4.4.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.13
  drift_dev: ^2.22.0
  riverpod_generator: ^2.6.1

flutter:
  uses-material-design: true
